name: Deploy on Push

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_prebuild:
        description: 'Run prebuild (fetch API data)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # prebuildなし時: キャッシュ復元
      - name: Restore generated cache
        if: ${{ !inputs.run_prebuild }}
        uses: actions/cache/restore@v4
        with:
          path: src/generated
          key: generated-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            generated-${{ runner.os }}-

      # prebuildあり時: API取得
      - name: Fetch Product Hunt data
        if: ${{ inputs.run_prebuild }}
        run: node scripts/fetch-posts.js --incremental
        env:
          PH_DEVELOPER_TOKEN: ${{ secrets.PH_DEVELOPER_TOKEN }}

      # prebuildあり時: 最新データをキャッシュに保存
      - name: Save generated cache
        if: ${{ inputs.run_prebuild }}
        uses: actions/cache/save@v4
        with:
          path: src/generated
          key: generated-${{ runner.os }}-${{ github.run_id }}

      - name: Build & Deploy
        run: npm run deploy
        env:
          SKIP_PREBUILD: 'true'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
